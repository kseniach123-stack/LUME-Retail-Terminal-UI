<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUME | Retail Terminal</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

    <style>
        .stage, .sidebar, .burger-btn, #cart-trigger, #cart-panel {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blur-content {
            filter: blur(10px) grayscale(20%);
            opacity: 0.6;
            pointer-events: none;
        }

        #cart-panel { 
            position: fixed !important;
            top: 0;
            right: -100%; 
            width: 100% !important; 
            height: 100vh;
            background: #fff !important;
            z-index: 3000 !important; 
            display: flex !important;
            flex-direction: column;
        }

        body.cart-open #cart-panel {
            right: 0 !important;
        }

        #cart-panel.hidden {
            display: flex !important; 
            pointer-events: none;
            opacity: 0;
        }
        
        body.cart-open #cart-panel.hidden {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="auth-screen" role="dialog" aria-labelledby="auth-title">
        <div class="auth-card">
            <h1 id="auth-title">LUME</h1>
            <form id="auth-form" data-testid="auth-form" aria-label="Login form">
                <input id="auth-username" name="username" type="text" class="auth-input" placeholder="USERNAME" required aria-label="Username" autocomplete="username">
                <input id="auth-password" name="password" type="password" class="auth-input" placeholder="PASSWORD" required aria-label="Password" autocomplete="current-password">
                <button type="submit" class="btn-login" data-testid="auth-submit">Login</button>
            </form>
        </div>
    </div>

    <div id="terminal-app" class="hidden">
        
        <aside class="sidebar" role="navigation" aria-label="Main navigation">
            <div class="brand" role="heading" aria-level="1">LUME</div>
            <div class="scan-action">
                <button class="btn-round-scan" onclick="LumeTerminal.actions.openScanner()" aria-label="Open barcode scanner">Scan Item</button>
            </div>
            <div class="logout-action" style="position:absolute;bottom:32px;left:0;width:100%;display:flex;justify-content:center;">
                <button class="btn-logout" onclick="LumeTerminal.ui.logout()" aria-label="Log out" style="width:50%;min-width:80px;max-width:140px;padding:0.5em 0.5em;font-size:0.8rem;border-radius:1.5em;background:#eee;color:#333;border:none;cursor:pointer;">Log out</button>
            </div>
            <nav class="nav-menu" role="tablist" aria-label="Main sections">
                <div id="dashboard-tab" class="nav-item active" data-tab="dashboard" onclick="LumeTerminal.ui.switchTab('dashboard')" role="tab" aria-selected="true" aria-controls="sec-dashboard" tabindex="0" onkeypress="if(event.key==='Enter')LumeTerminal.ui.switchTab('dashboard')">Dashboard</div>
                <div id="operations-tab" class="nav-item" data-tab="operations" onclick="LumeTerminal.ui.switchTab('operations')" role="tab" aria-selected="false" aria-controls="sec-operations" tabindex="0" onkeypress="if(event.key==='Enter')LumeTerminal.ui.switchTab('operations')">Operations</div>
                <div id="analytics-tab" class="nav-item" data-tab="analytics" onclick="LumeTerminal.ui.switchTab('analytics')" role="tab" aria-selected="false" aria-controls="sec-analytics" tabindex="0" onkeypress="if(event.key==='Enter')LumeTerminal.ui.switchTab('analytics')">Analytics</div>
            </nav>
        </aside>



        <main class="stage" role="main">
            <div class="topbar">
    <button class="burger-btn" onclick="LumeTerminal.ui.toggleMenu()" aria-label="Toggle navigation menu" aria-expanded="false">
        <span></span><span></span>
    </button>
    <button id="cart-trigger" onclick="LumeTerminal.ui.toggleCart()" aria-label="Open shopping cart" aria-expanded="false">
        <span>Cart</span>
        <div id="cart-count-badge" aria-label="Items in cart">0</div>
    </button>
            </div>

    <div id="cart-panel" role="dialog" aria-labelledby="cart-title" aria-modal="true" tabindex="-1">
        <div class="cart-panel-header">
            <h2 class="cart-panel-title" id="cart-title">Current Cart</h2>
            <button id="cart-close-btn" class="cart-close-btn" onclick="LumeTerminal.ui.toggleCart()" aria-label="Close cart">✕</button>
        </div>
        <div id="cart-items-list" role="list" aria-live="polite"></div>
        <div class="cart-panel-footer">
            <div class="cart-total-section">
                <span>Total:</span>
                <span id="cart-total-price" aria-live="polite">£0.00</span>
            </div>
            <button onclick="LumeTerminal.actions.completeTransaction()" class="btn-login btn-finish-transaction" aria-label="Complete transaction and checkout">Finish Transaction</button>
            <button type="button" onclick="LumeTerminal.ui.promptClearCart()" class="btn-clear-cart" aria-label="Clear all items from cart">Clear Cart</button>
        </div>
    </div>
            <section id="sec-dashboard" role="tabpanel" aria-labelledby="dashboard-tab">
                <div class="search-bar-container">
                    <input type="text" class="search-input" id="inventory-search" placeholder="Search product..." oninput="LumeTerminal.actions.search(this.value)" aria-label="Search products" aria-autocomplete="list" aria-controls="search-suggestions">
                </div>
                <div id="search-suggestions" class="suggestions-box hidden" role="listbox" aria-label="Product suggestions"></div>
                <div class="product-grid" id="grid-container" role="grid" aria-label="Product catalog"></div>
            </section>
            
<section id="sec-operations" class="hidden" role="tabpanel" aria-labelledby="operations-tab">
    <div class="content-module">
        <div class="module-header">
            <h2 id="operations-heading">Transactions</h2>
        </div>
        <div id="ops-list" class="transaction-list" role="list" aria-live="polite" aria-label="Transaction history">
        </div>
    </div>
</section>


<section id="sec-analytics" class="hidden" role="tabpanel" aria-labelledby="analytics-tab">
    <div class="content-module">
        <div class="module-header">
            <h2 id="analytics-heading">Analytics</h2>
            <div class="analytics-controls" aria-label="Analytics controls">
                <div class="analytics-user-pill" id="analytics-user-pill" role="button" tabindex="0" aria-label="Select user" aria-haspopup="dialog" aria-expanded="false" aria-controls="analytics-user-popover">
                    <span class="analytics-user-label">User</span>
                    <span id="analytics-user" class="analytics-user-value">—</span>
                </div>
                <div id="analytics-user-popover" class="analytics-user-popover hidden" role="dialog" aria-label="User picker">
                    <div class="analytics-user-title">View productivity for</div>
                    <div id="analytics-user-list" class="analytics-user-list" role="listbox" aria-label="Users"></div>
                </div>

                <div class="analytics-range-wrap">
                    <button id="analytics-range-trigger" type="button" class="analytics-range-trigger" aria-haspopup="dialog" aria-expanded="false" aria-controls="analytics-range-popover">
                        <span id="analytics-range-summary">All time</span>
                    </button>

                    <div id="analytics-range-popover" class="analytics-range-popover hidden" role="dialog" aria-label="Date range picker">
                        <div class="analytics-range-presets" role="group" aria-label="Quick ranges">
                            <button type="button" class="analytics-preset" data-preset="today">Today</button>
                            <button type="button" class="analytics-preset" data-preset="7d">7 Days</button>
                            <button type="button" class="analytics-preset" data-preset="mtd">This Month</button>
                        </div>
                        <div class="analytics-range-fields">
                            <label class="analytics-range-field">
                                <span class="analytics-range-label">From</span>
                                <input id="analytics-from" type="date" class="analytics-range-input" aria-label="From date">
                            </label>
                            <label class="analytics-range-field">
                                <span class="analytics-range-label">To</span>
                                <input id="analytics-to" type="date" class="analytics-range-input" aria-label="To date">
                            </label>
                        </div>
                        <div class="analytics-range-actions">
                            <button id="analytics-clear" type="button" class="analytics-range-clear">Clear</button>
                            <button id="analytics-close" type="button" class="analytics-range-close" aria-label="Close date range picker">Done</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="analytics-grid" role="region" aria-label="Sales analytics dashboard">
            <div class="kpi-card" role="article">
                <span class="kpi-label">Total Sales</span>
                <div class="kpi-value" id="stat-revenue" aria-live="polite">£0.00</div>
                <hr style="margin: 10px 0; border: none; border-top: 1px solid #ddd;">
                <div style="font-size:18px;opacity:0.6;display:flex;align-items:center;gap:8px;justify-content:flex-start;">
                  <span>ATV</span>
                  <span id="stat-atv" aria-live="polite">£0.00</span>
                </div>
            </div>
            <div class="kpi-card" role="article">
                <span class="kpi-label">Orders</span>
                <div class="kpi-value" id="stat-count" aria-live="polite">0</div>
            </div>
            <div class="kpi-card" role="article">
                <span class="kpi-label">Items Total</span>
                <div class="kpi-value" id="stat-items-total" aria-live="polite">0</div>
            </div>
        </div>
    </div>
</section>

        </main>
    </div>

    <div id="camera-module" class="hidden" role="dialog" aria-labelledby="scanner-title" aria-modal="true" tabindex="-1">
        <h2 id="scanner-title" class="visually-hidden">Barcode Scanner</h2>
        <div class="scanner-viewport">
            <div id="barcode-reader" class="barcode-reader" aria-label="Camera feed for barcode scanning"></div>
            <div class="camera-focus-frame" aria-hidden="true"></div>
        </div>
        <div class="scanner-footer">
            <button class="switch-camera-btn" onclick="LumeTerminal.actions.switchCamera()" aria-label="Switch between front and back camera">Switch Camera</button>
            <div id="scan-counter" class="scan-counter" aria-live="polite"></div>
            <button id="scanner-close-btn" class="scanner-done-btn" onclick="LumeTerminal.actions.finishScanning()" aria-label="Done scanning">Done</button>
        </div>
    </div>

    <div id="sync-status" class="sync-toast hidden" role="status" aria-live="polite" aria-label="Connectivity status"></div>

    <div id="clear-cart-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="clear-cart-title" aria-describedby="clear-cart-desc">
        <div class="modal-card" role="document">
            <h3 id="clear-cart-title" class="modal-title">Clear cart?</h3>
            <p id="clear-cart-desc" class="modal-desc">All items will be removed from the current cart.</p>
            <div class="modal-actions">
                <button type="button" id="clear-cart-cancel" class="modal-btn modal-btn--ghost">Cancel</button>
                <button type="button" id="clear-cart-confirm" class="modal-btn modal-btn--danger">Clear cart</button>
            </div>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
